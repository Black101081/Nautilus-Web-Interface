name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: ./backend
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ -v --tb=short

  # ── Frontend lint & build ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend build (Node 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true   # non-blocking until lint is fully configured

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_NAUTILUS_API_URL: "http://localhost:8000"
          VITE_WS_URL: "ws://localhost:8000"

  # ── E2E tests (API-level, requires backend running) ────────────────────────
  e2e-test:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Playwright and dependencies
        working-directory: ./e2e
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Start backend server
        working-directory: ./backend
        run: |
          uvicorn nautilus_fastapi:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to start..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health && break
            sleep 2
          done
        env:
          ENCRYPTION_KEY: "test-ci-encryption-key-32-chars!!"

      - name: Run E2E tests
        working-directory: ./e2e
        run: npx playwright test --reporter=list
        env:
          BASE_URL: "http://localhost:8000"
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ── Deploy frontend to Cloudflare Pages (main branch only) ─────────────────
  deploy-frontend:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_NAUTILUS_API_URL: ${{ secrets.VITE_NAUTILUS_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: nautilus-web-interface
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
