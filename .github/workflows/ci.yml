name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: ./backend
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ -v --tb=short

  # ── Frontend lint & build ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend build (Node 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true   # non-blocking until lint is fully configured

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_NAUTILUS_API_URL: "http://localhost:8000"
          VITE_WS_URL: "ws://localhost:8000"

  # ── Deploy frontend to Cloudflare Pages (main branch only) ─────────────────
  deploy-frontend:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_NAUTILUS_API_URL: ${{ secrets.VITE_NAUTILUS_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: nautilus-web-interface
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
