version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Comma-separated list of allowed frontend origins
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # Set a strong random value to enable API key auth:
      #   openssl rand -hex 32
      API_KEY: ""
      NAUTILUS_API_PORT: "8000"
    volumes:
      # Persist SQLite database across container restarts
      - backend_data:/app/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin_db_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python3", "admin_db_api.py"]
    ports:
      - "8001:8001"
    environment:
      ADMIN_DB_API_PORT: "8001"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      DB_PATH: "/app/data/admin_panel.db"
    volumes:
      - admin_data:/app/data
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/admin/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_NAUTILUS_API_URL: "http://localhost:8000"
        VITE_WS_URL: "ws://localhost:8000"
        VITE_ADMIN_DB_API_URL: "http://localhost:8001"
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      admin_db_api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.25"

volumes:
  backend_data:
  admin_data:
