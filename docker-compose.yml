version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Copy .env.example to .env and fill in the values before running in production
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Security — MUST be changed in production
      SECRET_KEY: "${SECRET_KEY:-dev-secret-key-CHANGE-IN-PRODUCTION-min-32-chars}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"

      # CORS — set to your frontend URL in production, e.g. https://myapp.example.com
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}"

      # Optional API key auth (leave empty to use JWT-only auth)
      API_KEY: "${API_KEY:-}"

      NAUTILUS_API_PORT: "8000"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-200}"
      LOGIN_RATE_LIMIT_PER_MINUTE: "${LOGIN_RATE_LIMIT_PER_MINUTE:-5}"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin_db_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python3", "admin_db_api.py"]
    ports:
      - "${ADMIN_PORT:-8001}:8001"
    environment:
      ADMIN_DB_API_PORT: "8001"
      # CORS — must match frontend origin
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}"
      DB_PATH: "/app/data/admin_panel.db"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-}"
    volumes:
      - admin_data:/app/data
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/admin/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In production set these to your actual server URLs, e.g.:
        #   VITE_NAUTILUS_API_URL: "https://api.myapp.example.com"
        VITE_NAUTILUS_API_URL: "${VITE_NAUTILUS_API_URL:-http://localhost:8000}"
        VITE_WS_URL: "${VITE_WS_URL:-ws://localhost:8000}"
        VITE_ADMIN_DB_API_URL: "${VITE_ADMIN_DB_API_URL:-http://localhost:8001}"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
      admin_db_api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.25"

volumes:
  backend_data:
  admin_data:
